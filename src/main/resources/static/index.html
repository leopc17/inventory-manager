<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body class="bg-light">

<div class="container mt-5 mb-5">

    <h1 class="text-center mb-4">Inventory Manager</h1>

    <!-- CADASTRAR PRODUTO -->
    <div class="card mb-4">
        <div class="card-header">
            <button class="btn w-100 text-start fw-bold" data-bs-toggle="collapse" data-bs-target="#cadastroProduto">
                Cadastrar Produto
            </button>
        </div>

        <div id="cadastroProduto" class="collapse">
            <div class="card-body">
                <div class="row g-3">
                    <div class="col-md-6">
                        <input id="name" class="form-control" placeholder="Nome do produto" required>
                    </div>
                    <div class="col-md-3">
                        <input id="price" type="number" step="0.01" class="form-control" placeholder="Preço" required>
                    </div>
                    <div class="col-md-3">
                        <input id="quantity" type="number" class="form-control" placeholder="Quantidade" required>
                    </div>
                    <div class="col-md-6">
                        <input id="shortDescription" class="form-control" placeholder="Descrição curta">
                    </div>
                    <div class="col-md-6">
                        <input id="longDescription" class="form-control" placeholder="Descrição longa">
                    </div>
                    <div class="col-md-6">
                        <select id="category" class="form-select">
                            <option value="ELECTRONICS">Electronics</option>
                            <option value="FOOD">Food</option>
                            <option value="CLOTHING">Clothing</option>
                        </select>
                    </div>
                    <div class="col-md-6 d-grid">
                        <button type="button" class="btn btn-primary" onclick="createProduct()">
                            Cadastrar Produto
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FILTRO POR CATEGORIA -->
    <div class="card mb-3">
        <div class="card-header">
            <button class="btn w-100 text-start fw-bold" data-bs-toggle="collapse" data-bs-target="#filtroCategoria">
                Filtrar por Categoria
            </button>
        </div>
        <div id="filtroCategoria" class="collapse">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <select id="filterCategory" class="form-select">
                            <option value="">Todas Categorias</option>
                            <option value="ELECTRONICS">Electronics</option>
                            <option value="FOOD">Food</option>
                            <option value="CLOTHING">Clothing</option>
                        </select>
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="button" class="btn btn-secondary" onclick="filterProducts()">
                            Filtrar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- FILTRO POR INTERVALO DE PREÇO -->
    <div class="card mb-3">
        <div class="card-header">
            <button class="btn w-100 text-start fw-bold" data-bs-toggle="collapse" data-bs-target="#filtroPreco">
                Filtrar por Intervalo de Preço
            </button>
        </div>
        <div id="filtroPreco" class="collapse">
            <div class="card-body">
                <div class="row g-3 align-items-end">
                    <div class="col-md-2">
                        <input id="minPrice" type="number" step="1" min="0" class="form-control" placeholder="Preço mínimo">
                    </div>
                    <div class="col-md-2">
                        <input id="maxPrice" type="number" step="1" min="0" class="form-control" placeholder="Preço máximo">
                    </div>
                    <div class="col-md-2 d-grid">
                        <button type="button" class="btn btn-secondary" onclick="filterProducts()">
                            Filtrar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ORDENAR E ESTOQUE BAIXO -->
    <div class="card mb-4">
        <div class="card-header">
            <button class="btn w-100 text-start fw-bold" data-bs-toggle="collapse" data-bs-target="#ordenarEstoque">
                Ordenação & Estoque Baixo
            </button>
        </div>
        <div id="ordenarEstoque" class="collapse">
            <div class="card-body">
                <div class="d-flex gap-2 flex-wrap">
                    <button type="button" class="btn btn-outline-secondary" onclick="orderProducts('desc')">
                        Preço ↑
                    </button>
                    <button type="button" class="btn btn-outline-secondary" onclick="orderProducts('asc')">
                        Preço ↓
                    </button>
                    <button type="button" class="btn btn-secondary" onclick="loadProducts()">
                        Atualizar
                    </button>
                    <button type="button" class="btn btn-warning" onclick="lowStock()">
                        Baixo estoque
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- PRODUTOS -->
    <div class="card">
        <div class="card-header">
            <b>Produtos</b>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-striped align-middle">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Quantidade</th>
                        <th>Categoria</th>
                        <th>Ações</th>
                    </tr>
                    </thead>
                    <tbody id="productTable"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
