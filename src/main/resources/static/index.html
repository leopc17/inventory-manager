<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Inventory Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">Inventory Manager</h1>

    <div class="card p-4 mb-4">

        <h4>Novo Produto</h4>

        <div class="row g-3">

            <div class="col-md-6">
                <input id="name" class="form-control" placeholder="Nome do produto">
            </div>

            <div class="col-md-3">
                <input id="price" type="number" class="form-control" placeholder="Preço">
            </div>

            <div class="col-md-3">
                <input id="quantity" type="number" class="form-control" placeholder="Quantidade">
            </div>

            <div class="col-md-6">
                <input id="shortDescription" class="form-control" placeholder="Descrição curta">
            </div>

            <div class="col-md-6">
                <input id="longDescription" class="form-control" placeholder="Descrição longa">
            </div>

            <div class="col-md-6">
                <select id="category" class="form-select">
                    <option>ELECTRONICS</option>
                    <option>FOOD</option>
                    <option>CLOTHING</option>
                    <option>OTHER</option>
                </select>
            </div>

            <div class="col-md-6">
                <button class="btn btn-primary w-100" onclick="createProduct()">
                    Cadastrar Produto
                </button>
            </div>

        </div>
    </div>

    <div class="card p-4">

        <div class="d-flex justify-content-between mb-3">
            <h4>Produtos</h4>
            <button class="btn btn-secondary" onclick="loadProducts()">
                Atualizar
            </button>
        </div>

        <table class="table table-striped">

            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Categoria</th>
                <th>Ações</th>
            </tr>
            </thead>

            <tbody id="productTable"></tbody>

        </table>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
